name: Update star history chart

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  refresh-star-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate star history chart
        env:
          STAR_HISTORY_REPO: Aspirin0000/zhouli-translator
          STAR_HISTORY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/build-star-history.mjs

      - name: Commit updated chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images/github-star-history-zhouli.svg
          if git diff --cached --quiet; then
            echo "No star chart changes detected."
            exit 0
          fi
          git commit -m "chore: refresh star history chart"
          git push
